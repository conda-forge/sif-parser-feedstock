{% set name = "sif-parser" %}
{% set version = "0.3.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sif_parser-{{ version }}.tar.gz
  sha256: 5faf1e156b1aef7835968bc3df651ad828c4d42f1c2c60a5bd26784519c2a111

build:
  entry_points:
    - sif_parser=sif_parser.__main__:_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numpy >=1.10
    - pandas
    - pillow
    - python >={{ python_min }}

test:
  imports:
    - sif_parser
  commands:
    - pip list
    - pip check
    - sif_parser --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fujiisoup/sif_parser
  summary: Python package to read Andor sif file.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fujiisoup
    - goanpeca
